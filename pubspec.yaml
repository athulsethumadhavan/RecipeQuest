name: recipe_quest
description: A recipe discovery app with a local SQLite database.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management (MVVM)
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.1

  # Local database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Image caching
  cached_network_image: ^3.3.1

  # Local storage (favorites)
  shared_preferences: ^2.2.3

  # Shimmer loading
  shimmer: ^3.0.0

  # URL launcher (video links)
  url_launcher: ^6.2.6

  # Remote backend
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
